services:
  redis:
    image: redis:7-alpine
    container_name: secure-rag-redis
    ports:
      - "63799:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: secure-rag-pgvector
    environment:
      POSTGRES_DB: secure_rag
      POSTGRES_USER: secure_rag
      POSTGRES_PASSWORD: secure_rag
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secure_rag -d secure_rag"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: secure-rag-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
